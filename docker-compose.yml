version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: task-manager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task-manager-network

  backend:
    build: ./backend
    container_name: task-manager-backend
    ports:
      - "5000:5000"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: task_manager
      PORT: 5000
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - task-manager-network
    command: sh -c "npm install && npm run dev"

networks:
  task-manager-network:
    driver: bridge

volumes:
  postgres_data: